services:
  app:
    build: .
    image: jdcb4/podcast-ad-remover:local
    restart: unless-stopped
    ports:
      - '8000:8000'
    volumes:
      - ./data:/data
      - .:/app
    environment:
      - SESSION_SECRET_KEY=replace-with-a-long-random-secret
      - BASE_URL=http://localhost:8000
      - GEMINI_API_KEY=
      - OPENAI_API_KEY=
      - ANTHROPIC_API_KEY=
      - OPENROUTER_API_KEY=
      - LOG_LEVEL=INFO
      - COOKIE_SECURE=false
      - TRUST_PROXY_HEADERS=false
